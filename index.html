<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FInce">
  <meta name="theme-color" content="#0F1117">
  <meta name="description" content="Türkçe konuşanlar için Fince öğrenme uygulaması">

  <title>FInce – Fince Öğren</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon & Icons -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- App renders here via JavaScript -->
    <div style="
      height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
      background:#0F1117; color:#F1F4FF;
      font-family: sans-serif;
    ">
      <div style="font-size:48px; font-weight:900;">
        <span style="color:#4ADE80">FI</span><span style="color:#A0AACC">nce</span>
      </div>
      <div style="color:#626884; font-size:14px;">Yükleniyor...</div>
    </div>
  </div>

  <!-- Data -->
  <script src="data/vocabulary.js"></script>
  <script src="data/sentences.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>
</html>
